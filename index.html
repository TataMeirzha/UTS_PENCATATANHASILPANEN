<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pencatatan Panen</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
}

/* 1. Atur container agar menjadi area relatif untuk elemen di dalamnya */
.container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    /* Membuat konten di dalamnya (h1, p, btn) rapi di tengah */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

/* 2. Atur Gambar agar berada di lapisan paling bawah (background) */
img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2; /* Di bawah semua elemen */
}

/* 3. Atur Overlay agar teks lebih terbaca */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5); /* Warna hitam transparan */
    z-index: -1; /* Di atas gambar, tapi di bawah teks */
}

/* 4. Styling Teks dan Tombol */
h1 {
    font-size: 56px;
    font-weight: 800;
    margin-bottom: 10px;
    text-transform: uppercase;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

p {
    font-size: 24px;
    margin-bottom: 30px;
}

.btn {
    padding: 16px 40px;
    background-color: white;
    color: #28a745;
    text-decoration: none;
    font-size: 20px;
    font-weight: bold;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn:hover {
    background-color: #28a745;
    color: white;
}

/* Responsive */
@media (max-width: 768px) {
    h1 { font-size: 32px; }
    p { font-size: 18px; }
    .btn { font-size: 18px; padding: 12px 24px; }
}
</style>

</head>
<body>
<img src="Cover.jpg">
<!-- overlay -->
<div class="overlay"></div>

<div class="container">
    <h1>Sistem Pencatatan Hasil Panen</h1>
    <p>Kelola data panen dengan mudah dan cepat</p>

    <button class="btn" onclick="goToLogin()">Masuk / Login</button>
</div>

<script>
function goToLogin(){
    window.location.href = "/api/login.php";
    window.location.href = "/api/Login_Register_form.css";
}
</script>

</body>
</html>
